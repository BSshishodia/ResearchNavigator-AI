<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document | PaperIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .gradient-text {
            background-image: linear-gradient(to right, #4f46e5, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="bg-white shadow-md sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex-shrink-0">
                <!-- UPDATED: Colorful, clickable title -->
                <a href="{{ url_for('home_route') }}" class="text-3xl font-extrabold gradient-text">PaperIQ</a>
            </div>
            <div class="flex space-x-4 items-center">
                <a href="{{ url_for('home_route') }}" class="text-gray-600 font-medium hover:text-indigo-600 transition duration-150 border-b-2 border-transparent hover:border-indigo-500">
                    Home
                </a>
                <a href="{{ url_for('upload_route') }}" class="text-gray-900 font-semibold hover:text-indigo-600 transition duration-150 border-b-2 border-indigo-500">
                    Document Analysis
                </a>
                <a href="{{ url_for('chat_route') }}" class="text-gray-600 font-medium hover:text-indigo-600 transition duration-150 border-b-2 border-transparent hover:border-indigo-500">
                    AI Assistant
                </a>
                <a href="{{ url_for('history_route') }}" class="text-gray-600 font-medium hover:text-indigo-600 transition duration-150 border-b-2 border-transparent hover:border-indigo-500">
                    History
                </a>
                <span class="text-gray-400">|</span>
                <span class="text-sm font-medium text-gray-700">Hello, {{ session.get('username', 'User') }}!</span>
                <a href="{{ url_for('logout_route') }}" class="flex items-center space-x-1 px-3 py-1 bg-red-500 text-white text-sm font-semibold rounded-lg hover:bg-red-600 transition duration-150 shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewbox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    <span>Logout</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-4xl mx-auto p-6 md:p-10">
    <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Local Document Analysis</h1>
    <p class="text-gray-600 mb-8">Upload a PDF or DOCX file to begin the automated insight extraction pipeline.</p>
    
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full">
        <h2 class="text-2xl font-bold text-indigo-700 mb-6">Analyze New Document</h2>
        
        {% if error %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4" role="alert">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            <label class="block">
                <span class="sr-only">Choose file</span>
                <input type="file" name="file" accept=".pdf, .docx" required
                       class="block w-full text-sm text-gray-500
                              file:mr-4 file:py-2 file:px-4
                              file:rounded-xl file:border-0
                              file:text-sm file:font-semibold
                              file:bg-indigo-50 file:text-indigo-700
                              hover:file:bg-indigo-100 transition duration-150"/>
            </label>
            
            <button type="submit" 
                    class="w-full flex items-center justify-center space-x-2 bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition duration-150 shadow-lg shadow-indigo-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewbox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>Analyze Document</span>
            </button>
        </form>
    </div>
</div>

</body>
</html>
